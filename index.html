<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Speed Test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>⌨️ Typing Speed Test</h1>

    <div class="difficulty">
      <button class="diff-btn active" data-level="easy">Easy</button>
      <button class="diff-btn" data-level="medium">Medium</button>
      <button class="diff-btn" data-level="hard">Hard</button>
    </div>

    <div class="paragraph-box" id="paragraphBox"></div>

    <textarea id="inputBox" placeholder="Start typing here to begin the test..." disabled></textarea>

    <div class="stats">
      <div class="stat">
        <span id="timer">60</span>
        <label>Seconds Left</label>
      </div>
      <div class="stat">
        <span id="wpm">0</span>
        <label>WPM</label>
      </div>
      <div class="stat">
        <span id="accuracy">100</span>
        <label>Accuracy %</label>
      </div>
      <div class="stat">
        <span id="highScore">0</span>
        <label>Best WPM</label>
      </div>
    </div>

    <button id="restartBtn">🔄 Restart</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
